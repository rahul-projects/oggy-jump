<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Body (Yellow Shirt) -->
  <rect x="35" y="45" width="30" height="25" fill="yellow" rx="2"/>
  <rect x="35" y="45" width="30" height="5" fill="white"/> <!-- collar -->
  <!-- Arms -->
  <rect x="25" y="45" width="10" height="20" fill="yellow" transform="rotate(20 30 50)"/>
  <rect x="65" y="45" width="10" height="20" fill="yellow" transform="rotate(-20 70 50)"/>
  <!-- Hands -->
  <circle cx="20" cy="65" r="4" fill="#ffe0bd"/>
  <circle cx="80" cy="65" r="4" fill="#ffe0bd"/>
  <!-- Shorts (Navy) -->
  <rect x="35" y="70" width="30" height="10" fill="navy"/>
  <!-- Legs -->
  <rect x="40" y="80" width="6" height="15" fill="#ffe0bd"/>
  <rect x="54" y="80" width="6" height="15" fill="#ffe0bd"/>
  <!-- Shoes -->
  <ellipse cx="43" cy="95" rx="6" ry="4" fill="#00bfff"/>
  <ellipse cx="57" cy="95" rx="6" ry="4" fill="#00bfff"/>
  <!-- Head -->
  <circle cx="50" cy="25" r="20" fill="#ffe0bd"/>
  <!-- Hair -->
  <path d="M 28 25 Q 50 0 72 25 L 75 15 Q 50 -5 25 15 Z" fill="black"/>
  <!-- Glasses -->
  <circle cx="40" cy="25" r="6" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="60" cy="25" r="6" fill="none" stroke="black" stroke-width="2"/>
  <line x1="46" y1="25" x2="54" y2="25" stroke="black" stroke-width="2"/>
  <line x1="34" y1="25" x2="28" y2="22" stroke="black" stroke-width="2"/>
  <line x1="66" y1="25" x2="72" y2="22" stroke="black" stroke-width="2"/>
  <circle cx="40" cy="25" r="1.5" fill="black"/>
  <circle cx="60" cy="25" r="1.5" fill="black"/>
  <!-- Mouth -->
  <path d="M 45 35 Q 50 40 55 35" fill="none" stroke="black" stroke-width="1.5"/>
</svg>
