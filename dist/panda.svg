<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Body -->
  <ellipse cx="50" cy="65" rx="25" ry="20" fill="white" stroke="black" stroke-width="1"/>
  <path d="M 25 55 Q 50 70 75 55" fill="none" stroke="black" stroke-width="10"/> <!-- black chest band -->
  <!-- Arms -->
  <ellipse cx="25" cy="60" rx="8" ry="15" fill="black" transform="rotate(30 25 60)"/>
  <ellipse cx="75" cy="60" rx="8" ry="15" fill="black" transform="rotate(-30 75 60)"/>
  <!-- Legs -->
  <ellipse cx="35" cy="85" rx="8" ry="12" fill="black"/>
  <ellipse cx="65" cy="85" rx="8" ry="12" fill="black"/>
  <!-- Head -->
  <circle cx="35" cy="15" r="8" fill="black"/>
  <circle cx="65" cy="15" r="8" fill="black"/>
  <circle cx="50" cy="30" r="20" fill="white" stroke="black" stroke-width="1"/>
  <!-- Eyes -->
  <ellipse cx="40" cy="25" rx="6" ry="9" fill="black" transform="rotate(-30 40 25)"/>
  <ellipse cx="60" cy="25" rx="6" ry="9" fill="black" transform="rotate(30 60 25)"/>
  <circle cx="40" cy="25" r="2" fill="white"/>
  <circle cx="60" cy="25" r="2" fill="white"/>
  <!-- Nose/Mouth -->
  <ellipse cx="50" cy="35" rx="4" ry="3" fill="black"/>
  <path d="M 45 40 Q 50 45 55 40" fill="none" stroke="black" stroke-width="1"/>
</svg>
