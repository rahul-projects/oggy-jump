<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Body -->
  <rect x="35" y="45" width="30" height="40" rx="10" fill="#0099cc"/>
  <circle cx="50" cy="65" r="12" fill="white"/>
  <!-- Bell collar -->
  <rect x="38" y="45" width="24" height="4" rx="2" fill="red"/>
  <circle cx="50" cy="50" r="4" fill="yellow"/>
  <!-- Arms -->
  <rect x="25" y="50" width="15" height="8" rx="4" transform="rotate(-30 25 50)" fill="#0099cc"/>
  <rect x="60" y="50" width="15" height="8" rx="4" transform="rotate(30 75 50)" fill="#0099cc"/>
  <!-- Hands -->
  <circle cx="22" cy="45" r="5" fill="white"/>
  <circle cx="78" cy="45" r="5" fill="white"/>
  <!-- Legs -->
  <rect x="40" y="80" width="8" height="12" fill="#0099cc"/>
  <rect x="52" y="80" width="8" height="12" fill="#0099cc"/>
  <!-- Feet -->
  <ellipse cx="44" cy="95" rx="7" ry="5" fill="white"/>
  <ellipse cx="56" cy="95" rx="7" ry="5" fill="white"/>
  <!-- Head -->
  <circle cx="50" cy="25" r="22" fill="#0099cc"/>
  <circle cx="50" cy="28" r="18" fill="white"/>
  <!-- Nose -->
  <circle cx="50" cy="18" r="4" fill="#e60000"/>
  <!-- Whiskers -->
  <line x1="35" y1="22" x2="45" y2="24" stroke="black" stroke-width="1"/>
  <line x1="35" y1="26" x2="45" y2="26" stroke="black" stroke-width="1"/>
  <line x1="35" y1="30" x2="45" y2="28" stroke="black" stroke-width="1"/>
  <line x1="65" y1="22" x2="55" y2="24" stroke="black" stroke-width="1"/>
  <line x1="65" y1="26" x2="55" y2="26" stroke="black" stroke-width="1"/>
  <line x1="65" y1="30" x2="55" y2="28" stroke="black" stroke-width="1"/>
  <line x1="50" y1="22" x2="50" y2="38" stroke="black" stroke-width="1"/>
  <!-- Mouth -->
  <path d="M 40 35 Q 50 45 60 35" fill="none" stroke="black" stroke-width="2"/>
  <!-- Eyes -->
  <circle cx="45" cy="10" r="5" fill="white" stroke="black" stroke-width="1"/>
  <circle cx="55" cy="10" r="5" fill="white" stroke="black" stroke-width="1"/>
  <circle cx="47" cy="11" r="2" fill="black"/>
  <circle cx="53" cy="11" r="2" fill="black"/>
</svg>
