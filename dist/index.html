<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oggy Jump Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <!-- Kid friendly background elements -->
        <div class="sun">☀️</div>
        <div class="cloud cloud1">☁️</div>
        <div class="cloud cloud2">☁️</div>
        <div class="cloud cloud3">☁️</div>
        <div class="rainbow">🌈</div>
        <div class="sparkle sparkle1">✨</div>
        <div class="sparkle sparkle2">✨</div>

        <div id="score">Score: 0 | Level: 1</div>
        <div id="game-over">Game Over!<br>Tap to Restart</div>
        <div id="level-up-toast">Level Up! 🌟 Speed increased!</div>

        <div id="oggy">🐱</div>
        <div id="cockroach">🪳</div>
        <div id="ground"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
