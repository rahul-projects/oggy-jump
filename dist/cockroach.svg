<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g id="cockroach">
    <!-- Antennae -->
    <path d="M40 30 Q20 10 10 20" fill="none" stroke="#000" stroke-width="2" />
    <path d="M60 30 Q80 10 90 20" fill="none" stroke="#000" stroke-width="2" />

    <!-- Body -->
    <ellipse cx="50" cy="60" rx="20" ry="30" fill="#8B4513" />

    <!-- Head -->
    <circle cx="50" cy="30" r="15" fill="#CD853F" />

    <!-- Eyes -->
    <circle cx="43" cy="25" r="5" fill="#FFF" />
    <circle cx="57" cy="25" r="5" fill="#FFF" />
    <circle cx="43" cy="25" r="2" fill="#000" />
    <circle cx="57" cy="25" r="2" fill="#000" />

    <!-- Legs -->
    <path d="M30 50 L15 45" fill="none" stroke="#000" stroke-width="2" />
    <path d="M30 60 L15 60" fill="none" stroke="#000" stroke-width="2" />
    <path d="M30 70 L15 75" fill="none" stroke="#000" stroke-width="2" />
    <path d="M70 50 L85 45" fill="none" stroke="#000" stroke-width="2" />
    <path d="M70 60 L85 60" fill="none" stroke="#000" stroke-width="2" />
    <path d="M70 70 L85 75" fill="none" stroke="#000" stroke-width="2" />
  </g>
</svg>